{% extends "base.html" %}

{% block title %}Page Not Found | Service Portal{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="text-center">
            <div class="error-page">
                <h1 class="error-code">404</h1>
                <h2 class="error-title">Page Not Found</h2>
                <p class="error-description">Sorry, the page you are looking for doesn't exist or has been moved.</p>
                <div class="error-actions">
                    <a href="{{ url_for('main.index') }}" class="btn btn-primary">Go Home</a>
                    <a href="{{ url_for('service.index') }}" class="btn btn-outline-primary">View Services</a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.error-page {
    padding: 4rem 2rem;
}

.error-code {
    font-size: 8rem;
    font-weight: 700;
    color: var(--primary-blue);
    margin-bottom: 1rem;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
}

.error-title {
    font-size: 2rem;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 1rem;
}

.error-description {
    font-size: 1.1rem;
    color: var(--text-light);
    margin-bottom: 2rem;
}

.error-actions .btn {
    margin: 0 10px 10px 0;
}
</style>
{% endblock %}
